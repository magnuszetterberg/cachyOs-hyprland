# Monitor wiki https://wiki.hyprland.org/0.45.0/Configuring/Monitors/

# Use monitor descriptions instead of interface names for stability
# Built-in laptop display
monitor = desc:Sharp Corporation 0x14F9, preferred, 0x0, 1

# Dell SP2309W monitor
# HP E243 monitor
monitor = desc:HP Inc. HP E243 CNC9292X78, preferred, 1920x0, 1

# Dell P2421 monitor (Serial: H3CNL23)
monitor = desc:Dell Inc. DELL P2421 CW2NL23, preferred, 3840x0, 1

# Dell P2421 monitor (Serial: CW2NL23) 
monitor = desc:Dell Inc. DELL P2421 H3CNL23, preferred, 5760x0, 1
 


# If you need to scale things like steam etc, please uncomment these lines.
# Adjust GDK_SCALE accordingly to your liking.
#xwayland {
#  force_zero_scaling = true       # Unscale XWayland
#}

#env = GDK_SCALE, 1.25                   # GDK Scaling Factor
