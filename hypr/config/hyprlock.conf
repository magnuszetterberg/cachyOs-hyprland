# =========================
# GENERAL
# =========================
general {
    disable_loading_bar = true
    grace = 5
    hide_cursor = true
}

# =========================
# BACKGROUND (wallpaper + blur)
# =========================
background {
    path = ~/.config/hypr/backgrounds/paint.jpg 
    blur_passes = 2
    blur_size = 8
    noise = 0.01
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# =========================
# CLOCK (center top)
# =========================
label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 96
    font_family = JetBrains Mono
    color = rgba(230, 230, 230, 0.95)

    position = 0, 120
    halign = center
    valign = center
}

# =========================
# DATE (below clock)
# =========================
label {
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    font_size = 22
    font_family = JetBrains Mono
    color = rgba(200, 200, 200, 0.75)

    position = 0, 40
    halign = center
    valign = center
}

# =========================
# USER GREETING
# =========================
label {
    text = Hello, $USER
    font_size = 20
    font_family = JetBrains Mono
    color = rgba(180, 180, 180, 0.6)

    position = 0, -10
    halign = center
    valign = center
}

# =========================
# INPUT FIELD (glass style)
# =========================
input-field {
    size = 280, 55
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true

    outer_color = rgba(120, 120, 120, 0.3)
    inner_color = rgba(30, 30, 30, 0.6)
    font_color = rgba(230, 230, 230, 1.0)

    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>

    position = 0, -100
    halign = center
    valign = center
}

# =========================
# FAILED LOGIN MESSAGE
# =========================
label {
    text = cmd[update:1000] echo "$FAIL"
    font_size = 14
    font_family = JetBrains Mono
    color = rgba(255, 80, 80, 0.9)

    position = 0, -170
    halign = center
    valign = center
}

# =========================
# CAPS LOCK INDICATOR
# =========================
label {
    text = cmd[update:1000] echo "$CAPSLOCK"
    font_size = 14
    font_family = JetBrains Mono
    color = rgba(255, 200, 100, 0.9)

    position = 0, -200
    halign = center
    valign = center
}